            line-height: 1.5;
            max-height: 100px;
            overflow: hidden;

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 10px;
            padding: 30px;

            max-height: 80vh;

        }
        
        .component-item:hover {

                }
                if (hanzi.references.成语 && hanzi.references.成语.length > 0) {
                    refHtml += `<p><strong>成语例句:</strong> ${hanzi.references.成语.join('、')}</p>`;
                }
                if (refHtml) {
                    bodyHtml += `
                        <div class="modal-section">
                            <h3>引用信息</h3>
                            ${refHtml}
                        </div>
                    `;
                }
            }
            
            // 例词例句
            if (hanzi.examples && hanzi.examples.length > 0) {
                bodyHtml += `
                    <div class="modal-section">
                        <h3>例词例句</h3>
                        <p>${hanzi.examples.join('、')}</p>
                    </div>
                `;
            }
            
            modalBody.innerHTML = bodyHtml;
            modal.style.display = 'block';
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
