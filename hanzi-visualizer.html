<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字可视化系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        
        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 搜索框 */
        .search-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #667eea;
        }
        
        /* 筛选按钮 */
        .filters {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* 汉字网格 */
        .hanzi-grid {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .grid-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .grid-count {
            color: #666;
            font-size: 14px;
        }
        
        .hanzi-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .hanzi-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .hanzi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }
        
        .hanzi-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }
        
        .hanzi-char {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        .hanzi-pinyin {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .hanzi-type {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .type-象形 { background: #ffebee; color: #c62828; }
        .type-指事 { background: #fff3e0; color: #ef6c00; }
        .type-会意 { background: #e8f5e9; color: #2e7d32; }
        .type-形声 { background: #e3f2fd; color: #1565c0; }
        .type-假借 { background: #f3e5f5; color: #7b1fa2; }
        .type-未分类 { background: #f5f5f5; color: #757575; }
        
        /* 详情面板 */
        .detail-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 20px;
        }
        
        .detail-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .detail-char {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .detail-pinyin {
            font-size: 24px;
            color: #666;
            margin-top: 10px;
        }
        
        .detail-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 16px;
            font-weight: 600;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .components-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .component-item {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .context-text {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }
        
        .empty-detail {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* 统计信息 */
        .stats {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .stat-item {
            padding: 15px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .page-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .page-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            padding: 8px 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">
                <div class="logo-icon">字</div>
                <h1>汉字可视化系统</h1>
            </div>
        </header>
        
        <!-- 统计信息 -->
        <div class="stats">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">收录汉字</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="radicalCount">0</div>
                    <div class="stat-label">部首分类</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="typeCount">0</div>
                    <div class="stat-label">字理类型</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="highQuality">0</div>
                    <div class="stat-label">高质量数据</div>
                </div>
            </div>
        </div>
        
        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="输入汉字或拼音搜索...">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="象形">象形</button>
                <button class="filter-btn" data-filter="指事">指事</button>
                <button class="filter-btn" data-filter="会意">会意</button>
                <button class="filter-btn" data-filter="形声">形声</button>
                <button class="filter-btn" data-filter="假借">假借</button>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 汉字网格 -->
            <div class="hanzi-grid">
                <div class="grid-header">
                    <div class="grid-title">汉字列表</div>
                    <div class="grid-count" id="gridCount">共 0 个汉字</div>
                </div>
                <div class="hanzi-container" id="hanziContainer">
                    <!-- 汉字卡片将在这里动态生成 -->
                </div>
                <div class="pagination">
                    <button class="page-btn" id="prevPage">上一页</button>
                    <span class="page-info" id="pageInfo">1 / 1</span>
                    <button class="page-btn" id="nextPage">下一页</button>
                </div>
            </div>
            
            <!-- 详情面板 -->
            <div class="detail-panel">
                <div id="detailContent">
                    <div class="empty-detail">
                        <div class="empty-icon">🔍</div>
                        <p>选择一个汉字查看详情</p>
                        <p style="font-size: 12px; margin-top: 10px;">点击左侧列表中的汉字卡片</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 汉字数据（内嵌部分数据用于演示）
        const hanziData = [
            { char: "前", pinyin: "qián", radical: "刂", ziType: "象形", qualityScore: 70, components: [{char: "至", type: "部件"}, {char: "从", type: "表义/音部件"}], context: "指汉字的构成是有逻辑的。汉字的基本元素是象形字。" },

            { char: "明", pinyin: "míng", radical: "日", ziType: "会意", qualityScore: 90, components: [{char: "日", type: "部件"}, {char: "月", type: "部件"}], context: "明亮，日月同辉。" },
            { char: "好", pinyin: "hǎo", radical: "女", ziType: "会意", qualityScore: 85, components: [{char: "女", type: "部件"}, {char: "子", type: "部件"}], context: "美好，女子。" },
            { char: "男", pinyin: "nán", radical: "田", ziType: "会意", qualityScore: 85, components: [{char: "田", type: "部件"}, {char: "力", type: "部件"}], context: "男性，田中出力。" },
            { char: "家", pinyin: "jiā", radical: "宀", ziType: "会意", qualityScore: 85, components: [{char: "宀", type: "部件"}, {char: "豕", type: "部件"}], context: "家庭，屋下有猪。" },
            { char: "安", pinyin: "ān", radical: "宀", ziType: "会意", qualityScore: 85, components: [{char: "宀", type: "部件"}, {char: "女", type: "部件"}], context: "安定，屋下有女。" },
            { char: "林", pinyin: "lín", radical: "木", ziType: "会意", qualityScore: 85, components: [{char: "木", type: "部件"}, {char: "木", type: "部件"}], context: "树林，双木成林。" },
            { char: "森", pinyin: "sēn", radical: "木", ziType: "会意", qualityScore: 85, components: [{char: "木", type: "部件"}, {char: "木", type: "部件"}, {char: "木", type: "部件"}], context: "森林，三木成森。" },
            { char: "众", pinyin: "zhòng", radical: "人", ziType: "会意", qualityScore: 85, components: [{char: "人", type: "部件"}, {char: "人", type: "部件"}, {char: "人", type: "部件"}], context: "众人，三人成众。" },
            { char: "品", pinyin: "pǐn", radical: "口", ziType: "会意", qualityScore: 85, components: [{char: "口", type: "部件"}, {char: "口", type: "部件"}, {char: "口", type: "部件"}], context: "品味，三口成品。" },
            { char: "晶", pinyin: "jīng", radical: "日", ziType: "会意", qualityScore: 85, components: [{char: "日", type: "部件"}, {char: "日", type: "部件"}, {char: "日", type: "部件"}], context: "晶亮，三日成晶。" },
            { char: "江", pinyin: "jiāng", radical: "氵", ziType: "形声", qualityScore: 85, components: [{char: "氵", type: "形旁"}, {char: "工", type: "声旁"}], context: "长江，水名。" },
            { char: "河", pinyin: "hé", radical: "氵", ziType: "形声", qualityScore: 85, components: [{char: "氵", type: "形旁"}, {char: "可", type: "声旁"}], context: "黄河，水名。" },
            { char: "湖", pinyin: "hú", radical: "氵", ziType: "形声", qualityScore: 80, components: [{char: "氵", type: "形旁"}, {char: "胡", type: "声旁"}], context: "湖泊，水域。" },
            { char: "海", pinyin: "hǎi", radical: "氵", ziType: "形声", qualityScore: 85, components: [{char: "氵", type: "形旁"}, {char: "每", type: "声旁"}], context: "海洋，大海。" },
            { char: "树", pinyin: "shù", radical: "木", ziType: "形声", qualityScore: 80, components: [{char: "木", type: "形旁"}, {char: "对", type: "声旁"}], context: "树木，木本植物。" },
            { char: "花", pinyin: "huā", radical: "艹", ziType: "形声", qualityScore: 80, components: [{char: "艹", type: "形旁"}, {char: "化", type: "声旁"}], context: "花朵，植物的花。" },
            { char: "草", pinyin: "cǎo", radical: "艹", ziType: "形声", qualityScore: 80, components: [{char: "艹", type: "形旁"}, {char: "早", type: "声旁"}], context: "草本植物。" },
            { char: "说", pinyin: "shuō", radical: "讠", ziType: "形声", qualityScore: 80, components: [{char: "讠", type: "形旁"}, {char: "兑", type: "声旁"}], context: "说话，言语。" },
            { char: "话", pinyin: "huà", radical: "讠", ziType: "形声", qualityScore: 80, components: [{char: "讠", type: "形旁"}, {char: "舌", type: "声旁"}], context: "话语，言语。" },
            { char: "读", pinyin: "dú", radical: "讠", ziType: "形声", qualityScore: 80, components: [{char: "讠", type: "形旁"}, {char: "卖", type: "声旁"}], context: "阅读，读书。" },
            { char: "写", pinyin: "xiě", radical: "冖", ziType: "形声", qualityScore: 75, components: [{char: "冖", type: "形旁"}, {char: "与", type: "声旁"}], context: "书写，写字。" },
            { char: "学", pinyin: "xué", radical: "子", ziType: "形声", qualityScore: 80, components: [{char: "子", type: "形旁"}, {char: "觉", type: "声旁"}], context: "学习，求学。" },
            { char: "习", pinyin: "xí", radical: "羽", ziType: "会意", qualityScore: 75, components: [{char: "羽", type: "部件"}], context: "练习，反复。" }
        ];
        
        // 全局状态
        let currentPage = 1;
        const itemsPerPage = 24;
        let filteredData = [...hanziData];
        let selectedHanzi = null;
        let currentFilter = 'all';
        
        // 初始化
        function init() {
            updateStats();
            renderGrid();
            setupEventListeners();
        }
        
        // 更新统计信息
        function updateStats() {
            document.getElementById('totalCount').textContent = hanziData.length;
            
            const radicals = new Set(hanziData.map(h => h.radical));
            document.getElementById('radicalCount').textContent = radicals.size;
            
            const types = new Set(hanziData.map(h => h.ziType));
            document.getElementById('typeCount').textContent = types.size;
            
            const highQuality = hanziData.filter(h => h.qualityScore >= 80).length;
            document.getElementById('highQuality').textContent = highQuality;
        }
        
        // 渲染网格
        function renderGrid() {
            const container = document.getElementById('hanziContainer');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);
            
            container.innerHTML = pageData.map(hanzi => `
                <div class="hanzi-card ${selectedHanzi?.char === hanzi.char ? 'selected' : ''}" 
                     data-char="${hanzi.char}">
                    <div class="hanzi-char">${hanzi.char}</div>
                    <div class="hanzi-pinyin">${hanzi.pinyin}</div>
                    <span class="hanzi-type type-${hanzi.ziType}">${hanzi.ziType}</span>
                </div>
            `).join('');
            
            // 更新计数
            document.getElementById('gridCount').textContent = `共 ${filteredData.length} 个汉字`;
            
            // 更新分页
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
            
            // 添加点击事件
            container.querySelectorAll('.hanzi-card').forEach(card => {
                card.addEventListener('click', () => {
                    const char = card.dataset.char;
                    selectHanzi(char);
                });
            });
        }
        
        // 选择汉字
        function selectHanzi(char) {
            selectedHanzi = hanziData.find(h => h.char === char);
            renderGrid();
            renderDetail();
        }
        
        // 渲染详情
        function renderDetail() {
            const detailContent = document.getElementById('detailContent');
            
            if (!selectedHanzi) {
                detailContent.innerHTML = `
                    <div class="empty-detail">
                        <div class="empty-icon">🔍</div>
                        <p>选择一个汉字查看详情</p>
                        <p style="font-size: 12px; margin-top: 10px;">点击左侧列表中的汉字卡片</p>
                    </div>
                `;
                return;
            }
            
            const h = selectedHanzi;
            detailContent.innerHTML = `
                <div class="detail-header">
                    <div class="detail-char">${h.char}</div>
                    <div class="detail-pinyin">${h.pinyin}</div>
                </div>
                
                <div class="detail-info">
                    <div class="info-item">
                        <div class="info-label">部首</div>
                        <div class="info-value">${h.radical}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">字理类型</div>
                        <div class="info-value">
                            <span class="hanzi-type type-${h.ziType}">${h.ziType}</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">质量评分</div>
                        <div class="info-value">${h.qualityScore}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">部件数量</div>
                        <div class="info-value">${h.components.length}</div>
                    </div>
                </div>
                
                ${h.components.length > 0 ? `
                <div class="detail-section">
                    <div class="section-title">部件分析</div>
                    <div class="components-list">
                        ${h.components.map(c => `
                            <div class="component-item">
                                <strong>${c.char}</strong> (${c.type})
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                ${h.context ? `
                <div class="detail-section">
                    <div class="section-title">字理解析</div>
                    <div class="context-text">${h.context}</div>
                </div>
                ` : ''}
            `;
        }
        
        // 筛选数据
        function filterData(filter) {
            currentFilter = filter;
            
            if (filter === 'all') {
                filteredData = [...hanziData];
            } else {
                filteredData = hanziData.filter(h => h.ziType === filter);
            }
            
            currentPage = 1;
            renderGrid();
        }
        
        // 搜索数据
        function searchData(query) {
            if (!query) {
                filteredData = currentFilter === 'all' 
                    ? [...hanziData] 
                    : hanziData.filter(h => h.ziType === currentFilter);
            } else {
                const baseData = currentFilter === 'all' 
                    ? hanziData 
                    : hanziData.filter(h => h.ziType === currentFilter);
                
                filteredData = baseData.filter(h => 
                    h.char.includes(query) || 
                    h.pinyin.includes(query.toLowerCase()) ||
                    h.radical.includes(query)
                );
            }
            
            currentPage = 1;
            renderGrid();
        }
        
        // 设置事件监听
        function setupEventListeners() {
            // 搜索框
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                searchData(e.target.value);
            });
            
            // 筛选按钮
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterData(btn.dataset.filter);
                });
            });
            
            // 分页按钮
            document.getElementById('prevPage').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderGrid();
                }
            });
            
            document.getElementById('nextPage').addEventListener('click', () => {
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderGrid();
                }
            });
        }
        
        // 启动
        init();
    </script>
</body>
</html>
